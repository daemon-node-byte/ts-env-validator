name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Verify tag matches package version
        run: |
          node -e '
            const fs = require("node:fs");
            const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
            const tag = process.env.GITHUB_REF_NAME;
            const expected = `v${pkg.version}`;
            if (tag !== expected) {
              console.error(`Tag/version mismatch: expected ${expected} but received ${tag}`);
              process.exit(1);
            }
            console.log(`Verified tag ${tag} matches package.json version ${pkg.version}`);
          '

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify package contents
        run: |
          PACK_OUTPUT="$(npm pack --dry-run 2>&1)"
          printf '%s\n' "$PACK_OUTPUT"
          grep -F "README.md" <<<"$PACK_OUTPUT" >/dev/null
          grep -F "LICENSE" <<<"$PACK_OUTPUT" >/dev/null

  publish-npm:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js for npmjs
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Publish to npm
        run: npm publish --provenance --access public

  publish-gpr:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js for GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: "@${{ github.repository_owner }}"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Stage package for GitHub Packages
        env:
          REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          STAGE_DIR="$(mktemp -d)"
          cp -R dist README.md LICENSE package.json "$STAGE_DIR"
          STAGE_DIR="$STAGE_DIR" node -e '
            const fs = require("node:fs");
            const path = require("node:path");
            const stageDir = process.env.STAGE_DIR;
            const owner = process.env.REPOSITORY_OWNER;
            const packagePath = path.join(stageDir, "package.json");
            const pkg = JSON.parse(fs.readFileSync(packagePath, "utf8"));
            pkg.name = `@${owner}/${pkg.name}`;
            fs.writeFileSync(packagePath, `${JSON.stringify(pkg, null, 2)}\n`);
            console.log(`Prepared ${pkg.name}@${pkg.version} for GitHub Packages`);
          '
          find "$STAGE_DIR" -maxdepth 2 -type f | sort
          (
            cd "$STAGE_DIR"
            npm pack --dry-run
          )
          echo "stage_dir=$STAGE_DIR" >> "$GITHUB_OUTPUT"
        id: stage

      - name: Publish to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd "${{ steps.stage.outputs.stage_dir }}"
          npm publish --registry https://npm.pkg.github.com
